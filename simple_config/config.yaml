# MatterGenбЕСЗХфжУ
defaults:
  - _self_

# Ъ§ОнХфжУ
data_module:
  _target_: mattergen.common.data.datamodule.CrystalDataModule
  dataset_name: "2d_materials"
  batch_size: 4
  num_workers: 0
  max_atoms: 100
  cutoff: 6.0

# ФЃаЭХфжУ
lightning_module:
  _target_: mattergen.diffusion.lightning_module.DiffusionLightningModule
  diffusion_steps: 1000
  learning_rate: 1e-4

# бЕСЗЦїХфжУ
trainer:
  max_epochs: 50
  devices: 1
  accelerator: "gpu"
  precision: "16-mixed"
  log_every_n_steps: 10
  val_check_interval: 0.5
  enable_checkpointing: true
  logger: false

# ЪфГіХфжУ
hydra:
  run:
    dir: outputs

# 二维材料筛选配置文件
# 基于论文"二维材料的高通量筛选与光催化性能预测"

# 筛选参数
screening:
  # 合成性约束
  max_elements: 3  # 最大元素种类
  
  # 二维性判断阈值
  max_binding_energy: 0.15  # 最大层间结合能 (eV/Å²)
  min_interlayer_distance: 2.5  # 最小层间距离 (Å)
  min_2d_score: 0.6  # 最小二维材料评分
  
  # 拓扑缩放算法(TSA)参数
  tsa:
    supercell_size: [2, 2, 2]  # 超胞大小
    scaling_tolerance: 0.5  # 缩放比例容差
    
  # 层状结构判断参数
  layered_structure:
    min_c_to_a_ratio: 1.5  # 最小c/a轴比
    min_c_to_b_ratio: 1.5  # 最小c/b轴比
    min_density_anisotropy: 0.3  # 最小密度各向异性
    
  # 结合能估算参数
  binding_energy:
    vdw_alpha: 0.1  # vdW相互作用参数 (eV·Å⁴)
    max_estimate: 1.0  # 最大估算结合能 (eV/Å²)

# 评分权重
scoring_weights:
  tsa_analysis: 0.4  # TSA分析权重
  layered_structure: 0.3  # 层状结构权重  
  interlayer_distance: 0.2  # 层间距离权重
  binding_energy: 0.1  # 结合能权重

# 输入输出路径
paths:
  input_dir: "data/filtered"  # 输入目录（合成性筛选结果）
  output_dir: "data/2d_materials"  # 输出目录
  
# 文件输出设置
output:
  save_full_results: true  # 保存完整结果
  save_candidates_only: true  # 保存候选材料
  save_csv_summary: true  # 保存CSV摘要
  save_plots: true  # 保存统计图表

# 处理设置
processing:
  show_progress: true  # 显示处理进度
  progress_interval: 100  # 进度显示间隔
  error_handling: "continue"  # 错误处理方式: continue/stop
  
# 论文中提到的已知二维材料作为验证
validation_materials:
  - "MoS2"  # 二硫化钼
  - "WSe2"  # 二硒化钨
  - "h-BN"  # 六方氮化硼
  - "Bi2Se3"  # 硒化铋
  - "Bi2Te3"  # 碲化铋
  - "InSe"  # 硒化铟
  - "GaS"  # 硫化镓
  - "GaSe"  # 硒化镓
  - "SnS"  # 硫化锡
  - "SnSe"  # 硒化锡
  - "TiS3"  # 三硫化钛
  - "TcS2"  # 二硫化锝
  - "TcSe2"  # 二硒化锝

# 筛选流程说明
workflow_description: |
  二维材料二次筛选流程：
  1. 读取已经过合成性筛选的材料（元素种类≤3）
  2. 应用拓扑缩放算法(TSA)识别材料维度
  3. 分析层状结构特征（层间距离、晶格各向异性等）
  4. 估算层间van der Waals结合能
  5. 综合评分并筛选出二维材料候选
  6. 输出筛选结果和统计信息
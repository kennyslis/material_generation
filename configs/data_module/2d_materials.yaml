# 2D材料数据模块配置

_target_: mattergen.data.CrystalDataModule

# 数据路径
dataset_name: "2d_materials"
csv_path: "data/mattergen/materials.csv"
cif_column: "cif_file"
id_column: "material_id"

# 缓存设置
cache_folder: "data/mattergen/cache"
force_reload: false

# 批处理设置
batch_size: 8
num_workers: 0  # Windows建议设为0
pin_memory: true
persistent_workers: false

# 数据分割
train_split: 0.8
val_split: 0.1
test_split: 0.1
random_seed: 42

# 结构处理参数
max_atoms: 100
cutoff_radius: 6.0
max_neighbors: 32

# 数据增强
data_augmentation: true
rotation_prob: 0.5
noise_prob: 0.3
noise_scale: 0.1

# 图构建参数
edge_cutoff: 6.0
self_loops: false

# 特征设置
atom_feature_dim: 128
edge_feature_dim: 64

# 过滤器
min_atoms: 2
max_atoms: 100
filter_metals: false
filter_organic: false

# 标准化
normalize_positions: true
normalize_lattice: true

# 属性预测（可选）
properties_csv: null
property_columns: []
normalize_properties: true